<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6️⃣7️⃣</title>
    <link rel="icon" href="https://kovu.dog/favicon.webp" />
    <style>
      /* --- ALL CSS REMAINS EXACTLY THE SAME --- */
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #050505;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        animation: cinematicFlicker 4s infinite alternate;
      }

      @keyframes cinematicFlicker {
        0% {
          opacity: 0.97;
        }
        100% {
          opacity: 1;
        }
      }

      #meme-gif {
        width: 100vmin;
        height: 100vmin;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        z-index: 1;
        filter: contrast(1.05) brightness(0.95) saturate(0.85) sepia(0.15)
          hue-rotate(-5deg);
      }

      .vhs-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 10;
        box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.8);
      }

      .vhs-overlay::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.03) 0%,
            rgba(0, 255, 0, 0.01) 50%,
            rgba(0, 0, 255, 0.03) 100%
          ),
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
        background-size:
          150px 150px,
          100% 100%,
          100% 4px;
        opacity: 0.6;
        z-index: 11;
        animation: grainShift 0.08s infinite steps(2);
      }

      @keyframes grainShift {
        0% {
          background-position:
            0 0,
            0 0,
            0 0;
        }
        50% {
          background-position:
            25px 25px,
            0 0,
            0 0;
        }
        100% {
          background-position:
            -25px -25px,
            0 0,
            0 0;
        }
      }

      .vhs-overlay::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 25vh;
        background: rgba(255, 255, 255, 0.01);
        z-index: 12;
        backdrop-filter: blur(1.5px) brightness(1.05);
        -webkit-backdrop-filter: blur(1.5px) brightness(1.05);
        animation: slowRoll 12s linear infinite;
      }

      @keyframes slowRoll {
        0% {
          transform: translateY(-30vh);
        }
        100% {
          transform: translateY(130vh);
        }
      }

      #chaos-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 15;
        overflow: hidden;
      }

      .tape-spot {
        position: absolute;
        background-color: #000;
        opacity: 0.8;
        border-radius: 40%;
      }
    </style>
  </head>
  <body>
    <audio id="meme-audio" crossorigin="anonymous"></audio>

    <div id="chaos-container"></div>
    <div class="vhs-overlay"></div>

    <img id="meme-gif" src="6-7.gif" alt="Meme" />

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const memeAudio = document.getElementById("meme-audio");
        const chaosContainer = document.getElementById("chaos-container");

        let audioCtx;

        // --- 1. INITIALIZE WEB AUDIO EFFECTS IMMEDIATELY ---
        function initAudioEffects() {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          audioCtx = new AudioContext();

          const source = audioCtx.createMediaElementSource(memeAudio);

          const lowpass = audioCtx.createBiquadFilter();
          lowpass.type = "lowpass";
          lowpass.frequency.value = 3500;

          const highpass = audioCtx.createBiquadFilter();
          highpass.type = "highpass";
          highpass.frequency.value = 350;

          const distortion = audioCtx.createWaveShaper();
          function makeDistortionCurve(amount) {
            let k = typeof amount === "number" ? amount : 50,
              n_samples = 44100,
              curve = new Float32Array(n_samples),
              deg = Math.PI / 180,
              i = 0,
              x;
            for (; i < n_samples; ++i) {
              x = (i * 2) / n_samples - 1;
              curve[i] = ((3 + k) * x * 20 * deg) / (Math.PI + k * Math.abs(x));
            }
            return curve;
          }
          distortion.curve = makeDistortionCurve(5);

          const masterGain = audioCtx.createGain();
          masterGain.gain.value = 0.8;

          source.connect(highpass);
          highpass.connect(lowpass);
          lowpass.connect(distortion);
          distortion.connect(masterGain);
          masterGain.connect(audioCtx.destination);

          const bufferSize = audioCtx.sampleRate * 2;
          const noiseBuffer = audioCtx.createBuffer(
            1,
            bufferSize,
            audioCtx.sampleRate,
          );
          const output = noiseBuffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
          }
          const noise = audioCtx.createBufferSource();
          noise.buffer = noiseBuffer;
          noise.loop = true;

          const noiseFilter = audioCtx.createBiquadFilter();
          noiseFilter.type = "lowpass";
          noiseFilter.frequency.value = 4000;

          const noiseGain = audioCtx.createGain();
          noiseGain.gain.value = 0.02;

          noise.connect(noiseFilter);
          noiseFilter.connect(noiseGain);
          noiseGain.connect(audioCtx.destination);
          noise.start();
        }

        initAudioEffects();

        function playTapePop() {
          if (!audioCtx || audioCtx.state === "suspended") return;
          const popOsc = audioCtx.createOscillator();
          const popGain = audioCtx.createGain();

          popOsc.type = "sine";
          popOsc.frequency.setValueAtTime(100, audioCtx.currentTime);
          popOsc.frequency.exponentialRampToValueAtTime(
            10,
            audioCtx.currentTime + 0.05,
          );

          popGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
          popGain.gain.exponentialRampToValueAtTime(
            0.01,
            audioCtx.currentTime + 0.05,
          );

          popOsc.connect(popGain);
          popGain.connect(audioCtx.destination);

          popOsc.start();
          popOsc.stop(audioCtx.currentTime + 0.05);
        }

        // --- 2. THE VISUAL CHAOS ENGINE ---
        function spawnArtifact() {
          if (Math.random() < 0.3) {
            const spot = document.createElement("div");
            spot.classList.add("tape-spot");

            const isLargeDropout = Math.random() < 0.05;
            const width = isLargeDropout
              ? Math.random() * 100 + 50
              : Math.random() * 15 + 2;
            const height = isLargeDropout
              ? Math.random() * 15 + 2
              : Math.random() * 10 + 2;

            spot.style.width = `${width}px`;
            spot.style.height = `${height}px`;
            spot.style.left = `${Math.random() * 100}vw`;
            spot.style.top = `${Math.random() * 100}vh`;

            if (Math.random() < 0.15) {
              spot.style.backgroundColor = "rgba(255, 255, 255, 0.7)";
            } else {
              spot.style.backgroundColor = `rgba(0, 0, 0, ${Math.random() * 0.5 + 0.4})`;
            }

            chaosContainer.appendChild(spot);

            if (isLargeDropout) {
              playTapePop();
            }

            setTimeout(
              () => {
                spot.remove();
              },
              Math.random() * 120 + 30,
            );
          }
        }

        setInterval(spawnArtifact, 50);

        // --- 3. THE AUDIO PLAYLIST ---
        const playlist = ["1.opus", "2.opus", "3.opus", "4.opus", "5.opus"];

        for (let i = playlist.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
        }

        let currentTrack = 0;
        memeAudio.src = playlist[currentTrack];

        memeAudio.addEventListener("ended", () => {
          currentTrack++;
          if (currentTrack >= playlist.length) {
            currentTrack = 0;
          }
          memeAudio.src = playlist[currentTrack];
          memeAudio
            .play()
            .catch((e) => console.error("Playlist playback failed:", e));
        });

        // --- 4. AUTOPLAY & INTERACTION FALLBACK ---
        memeAudio
          .play()
          .then(() => {
            if (audioCtx.state === "suspended") {
              console.log(
                "Audio playing, but Web Audio API suspended. Waiting for click to unmute.",
              );
            } else {
              console.log("Full VHS autoplay successful!");
            }
          })
          .catch((e) =>
            console.log("Autoplay entirely blocked. Waiting for click."),
          );

        const forceAudioPlay = () => {
          // Wake up the audio filters
          if (audioCtx && audioCtx.state === "suspended") {
            audioCtx.resume();
          }
          memeAudio.play().catch((e) => console.error("Still blocked:", e));

          // Ask iOS for accelerometer permissions (Android ignores this and falls to the 'else')
          if (
            typeof DeviceMotionEvent !== "undefined" &&
            typeof DeviceMotionEvent.requestPermission === "function"
          ) {
            DeviceMotionEvent.requestPermission()
              .then((response) => {
                if (response === "granted") {
                  window.addEventListener("devicemotion", handleShake);
                }
              })
              .catch(console.error);
          } else {
            // Non-iOS devices just start listening
            window.addEventListener("devicemotion", handleShake);
          }

          // Clean up listeners
          document.removeEventListener("click", forceAudioPlay);
          document.removeEventListener("touchstart", forceAudioPlay);
          document.removeEventListener("keydown", forceAudioPlay);
        };

        document.addEventListener("click", forceAudioPlay);
        document.addEventListener("touchstart", forceAudioPlay);
        document.addEventListener("keydown", forceAudioPlay);

        // --- 5. THE EASTER EGG (KEYLOGGER) ---
        let keyBuffer = "";
        const secretCode = "BALLS";

        document.addEventListener("keydown", (e) => {
          if (e.key.length === 1) {
            keyBuffer += e.key.toUpperCase();
            if (keyBuffer.length > secretCode.length) {
              keyBuffer = keyBuffer.slice(-secretCode.length);
            }
            if (keyBuffer === secretCode) {
              document.getElementById("meme-gif").src = "balls.gif";
            }
          }
        });

        // --- 6. THE MOBILE SHAKE EASTER EGG ---
        let lastUpdate = 0;
        let lastX = null,
          lastY = null,
          lastZ = null;
        const SHAKE_THRESHOLD = 800; // Increase this if it triggers too easily

        function handleShake(event) {
          const current = event.accelerationIncludingGravity;
          if (!current) return;

          let currentTime = Date.now();
          let timeDifference = currentTime - lastUpdate;

          // Check movement every 100ms
          if (timeDifference > 100) {
            if (lastX !== null) {
              // Calculate speed of phone movement
              let speed =
                (Math.abs(
                  current.x + current.y + current.z - lastX - lastY - lastZ,
                ) /
                  timeDifference) *
                10000;

              if (speed > SHAKE_THRESHOLD) {
                document.getElementById("meme-gif").src = "balls.gif";
              }
            }

            lastX = current.x;
            lastY = current.y;
            lastZ = current.z;
            lastUpdate = currentTime;
          }
        }
      });
    </script>
  </body>
</html>
